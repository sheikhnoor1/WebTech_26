<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="../Design/Style.css">
</head>

<body>
    
<div class="container">

     <h2>Contact us</h2>
<form id="contactForm">

<table>
  <tr>
    <td><label>FIRST NAME</label><br>
    <input type="text" id="fname">
    </td>

    <td><label>LAST NAME</label><br>
    <input type="text" id="lname"></td>
   </tr>

    <tr>
     <td><label>EMAIL</label><br>
     <input type="email" id="email"></td>

     <td><label>PHONE NUMBER</label><br>
     <input type="text" id="phone"></td>
     </tr>

     <tr><td colspan="2">
     <label>WHAT DO YOU HAVE IN MIND</label><br>
     <textarea id="message" placeholder="Please enter query..."></textarea></td>
     </tr>
     <tr><td colspan="2" align="center">
     <button type="submit">Submit</button></td>
     </tr>
  </table>
     <p id="error"></p></form>
</div>

<script src="../JavaScript/Script.js"></script>
</body>
</html>
